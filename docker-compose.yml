services:
  api:
    image: golang:1.24-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    command: go run ./cmd/api
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8080:8080"
  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - api
volumes:
  web_node_modules:
